<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Instruments product page</title>
    <link rel="stylesheet" href="./styles.css" />
</head>

<body>
    <h1>Student Instruments</h1>

    <main>
        <select class="select-container">
            <option id="all" value="all">All</option>
            <option id="woodwinds" value="woodwinds">Woodwinds</option>
            <option id="brass" value="brass">Brass</option>
            <option id="percussion" value="percussion">Percussion</option>
        </select>

        <div class="products-container">
            <div class="card">
                <h2>Flute</h2>
                <p>$500</p>
            </div>
            <div class="card">
                <h2>Clarinet</h2>
                <p>$200</p>
            </div>
            <div class="card">
                <h2>Oboe</h2>
                <p>$4000</p>
            </div>

            <div class="card">
                <h2>Trumpet</h2>
                <p>$200</p>
            </div>
            <div class="card">
                <h2>Trombone</h2>
                <p>$300</p>
            </div>
            <div class="card">
                <h2>French Horn</h2>
                <p>$4300</p>
            </div>

            <div class="card">
                <h2>Drum Set</h2>
                <p>$500</p>
            </div>
            <div class="card">
                <h2>Xylophone</h2>
                <p>$3000</p>
            </div>
            <div class="card">
                <h2>Cymbals</h2>
                <p>$200</p>
            </div>
            <div class="card">
                <h2>Marimba</h2>
                <p>$3000</p>
            </div>
        </div>
    </main>
    <script src="./script.js"></script>
    <script>
        const instrumentsArr = [
            { category: "woodwinds", instrument: "Flute", price: 500 },
            { category: "woodwinds", instrument: "Clarinet", price: 200 },
            { category: "woodwinds", instrument: "Oboe", price: 4000 },
            { category: "brass", instrument: "Trumpet", price: 200 },
            { category: "brass", instrument: "Trombone", price: 300 },
            { category: "brass", instrument: "French Horn", price: 4300 },
            { category: "percussion", instrument: "Drum Set", price: 500 },
            { category: "percussion", instrument: "Xylophone", price: 3000 },
            { category: "percussion", instrument: "Cymbals", price: 200 },
            { category: "percussion", instrument: "Marimba", price: 3000 }
        ]

        const selectContainer = document.querySelector("select");
        const productsContainer = document.querySelector(".products-container");
        function instrumentCards(instrumentCategory) {
            const instruments =
                instrumentCategory === "all"
                    ? instrumentsArr
                    : instrumentsArr.filter(
                        ({ category }) => category === instrumentCategory
                    );

            return instruments.map((catInstrument) => {
                return "<div class='card'><h2>${catInstrument.instrument}</h2><p>${catInstrument.price}</p></div>"
            })
        }
        selectContainer.addEventListener("change", () => {
            console.log(instrumentCards(selectContainer.value));
        });
    </script>
</body>

</html>
