<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline-Block</title>
    <style>
        *{
            margin: 0;
        }
        main{
            width: 100%;
            background-color: bisque;
            
            /* padding: 1.5rem; */
        }
        .inline-block{
            width: 20%;
            display: inline-block;
            background-color: rgb(231, 172, 95);
            /* vertical-align: top; */
        }
    </style>
</head>
<body>
    <main>
        <div class="inline-block">Lorem ipsum dolor sit amet consectetur adipisicing elit. Temporibus, non?
        </div>
        <span class="inline-block">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Eligendi, at!</span>
    </main>
</body>
</html>
